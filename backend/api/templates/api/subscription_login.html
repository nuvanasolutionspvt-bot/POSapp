<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NuvaBill Owner Login</title>
  <style>
    :root {
      --primary: #02066F;
      --bg: #f5f6fb;
      --card: #ffffff;
      --line: #d9deea;
      --text: #111827;
      --muted: #667085;
      --danger: #b42318;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 18px 40px rgba(17, 24, 39, .12);
      overflow: hidden;
    }

    .header {
      background: var(--primary);
      color: #fff;
      padding: 26px;
    }

    .mark {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: #fff;
      color: var(--primary);
      font-weight: 900;
      margin-bottom: 16px;
    }

    h1, p { margin: 0; }
    h1 { font-size: 24px; }
    .subtitle { margin-top: 6px; color: rgba(255,255,255,.76); font-size: 14px; }

    form {
      display: grid;
      gap: 14px;
      padding: 24px;
    }

    label {
      display: grid;
      gap: 7px;
      font-size: 12px;
      font-weight: 800;
      color: #344054;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      height: 46px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0 12px;
      font: inherit;
      color: var(--text);
    }

    button {
      height: 48px;
      border: 0;
      border-radius: 12px;
      background: var(--primary);
      color: #fff;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      margin-top: 4px;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 18px;
      text-align: center;
    }

    .error {
      border: 1px solid #fecdca;
      background: #fffbfa;
      color: var(--danger);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <section class="login-card">
    <div class="header">
      <div class="mark">NB</div>
      <h1>Owner Dashboard Login</h1>
      <p class="subtitle">For NuvaBill app owner subscription management only.</p>
    </div>

    <form method="post">
      {% csrf_token %}

      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}

      <label>
        Username
        <input name="username" value="{{ default_username }}" autocomplete="username" required>
      </label>

      <label>
        Password
        <input name="password" type="password" autocomplete="current-password" required>
      </label>

      <button type="submit">Login</button>
      <p class="hint">Default local owner credentials can be changed with SUBSCRIPTION_OWNER_USERNAME and SUBSCRIPTION_OWNER_PASSWORD in backend .env.</p>
    </form>
  </section>
</body>
</html>
